  Used Claude to validate the approach and for code review

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Three-pass evidence ranker (V1 Heuristic). Pass 1: O(N) hard elimination
  (honeypots, ghosts, wrong-domain, pure-consulting profiles). Pass 2:
  five-dimension profile score - career evidence (40%, keyword evidence from
  career_history descriptions rather than the skills list), skills trust
  (25%, cross-validated against career text + platform assessments),
  experience fit (15%), location (12%), education (8%). Pass 3: a
  multiplicative behavioural modifier (x0.40-1.30) from Redrob activity
  signals - availability, responsiveness, reliability. Final output rank list
  of top 100 candidates is outputted in CSV format. Run time is ~6 seconds
  on CPU for 100,000 candidates.

